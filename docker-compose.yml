services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: wanderzee-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: wanderzee
      POSTGRES_PASSWORD: wanderzee_dev_2024
      POSTGRES_DB: wanderzee
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wanderzee"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wanderzee-cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
